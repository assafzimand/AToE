# ══════════════════════════════════════════════════════════════════════════
# SMOKE-TEST PLAN — exercises every PDE and every optional feature with tiny
# budgets so the full flow (root → M-term tree → leaf split → PoU fine-tune)
# can be verified from the logs on CPU in minutes.
#
#   python run_experiments.py experiments_plan_smoke.yaml
#
# IMPORTANT: this generates SMALL datasets under datasets/<problem>/.
# Delete those directories before any real run, or the real run will silently
# reuse the tiny datasets (generation is skipped when files exist).
#
# What each experiment covers:
#   burgers_pretrained   pretrained root loading + adaptive sampling + LBFGS polish
#   burgers_lra_glorot_ls  fresh root, LRA weighting, glorot hidden + LS output init
#   allen_cahn_causal    causal weighting + periodic BC pairing + continuity term
#   kdv_rwf              RWF layers + parent_weights expert init (3rd-order PDE)
#   ks_ff_timemarching   Fourier features + time marching (2 windows, 4th-order PDE)
#   schrodinger_soap     output_dim=2 + SOAP optimizer (no switch)
#   burgers_ssbroyden    tiny net + SSBroyden second-stage (falls back to LBFGS loudly
#                        if scimba is missing — check the log)
#   kdv_resnet           resnet expert_type for base + experts
# ══════════════════════════════════════════════════════════════════════════
experiment_name: "smoke_test"

base_config:
  problem: burgers1d
  model: AToELeaves
  activation: tanh
  precision: float64

  epochs: 60                          # Phase-3 leaf split budget
  batch_size: 99999
  min_epochs: 1
  eval_every: 10
  patience_evals: 50                  # effectively disabled at this scale
  patience_rel_delta: 0.01

  optimizer_1: adam
  optimizer_2: lbfgs                  # light second stage for CPU smoke runs
  optimizer_switch_epoch: 30
  lr: 0.001
  lr_schedule: none
  lr_decay_rate: 0.98
  lr_decay_steps: 1000
  lr_warmup_steps: 0
  lr_warmup_start_factor: 0.01

  adam:
    betas: [0.9, 0.999]
    eps: 1.0e-8
  lbfgs:
    lr: 1.0
    max_iter: 1
    history_size: 100
    line_search: 'strong_wolfe'
    tolerance_grad: 0.0
    tolerance_change: 0.0
  ssbroyden:
    lr: 1.0
    tolerance_grad: 1.0e-10
  soap:
    betas: [0.95, 0.95]
    precondition_frequency: 10
    weight_decay: 0.0

  cuda: true                          # falls back to CPU automatically
  eval_only: false
  resume_from: null
  print_every: 10
  save_every: 999999
  seed: 42

  allen_cahn:
    pretrained_base_checkpoint: null
    spatial_dim: 1
    output_dim: 1
    spatial_domain: [[-1.0, 1.0]]
    temporal_domain: [0.0, 1.0]
    D: 0.0001
    wavelet_threshold: 0.002
    new_norm_threshold: 0.04
    tree_smoothness_threshold: 0.5
    window_type: smoothstep
    window_smoothness_order: 2
    loss_weights: {residual: 1.0, ic: 1.0, bc: 1.0, continuity: 0.0}
    causal_training: {enabled: false, num_chunks: 8, tol_schedule: [0.01, 0.1, 1.0], min_weight_threshold: 0.99}
    rwf: {enabled: false, mean: 1.0, std: 0.1}
    fourier_features: {enabled: false, dim: 10, scale: 3.0, periodic: false}
    init: {hidden: default, output: default, ls_use_bias: false}
    lra: {enabled: false, update_every: 20, alpha: 0.1, scheme: grad_norm, epsilon: 1.0e-5}
    adaptive_sampling: {enabled: false, adaptive_ratio: 0.3, phi: quadratic, phi_epsilon: 1.0, phi_power: 2.0}
    grad_clip_norm: null
    expert_grad_clip_norm: null
    time_marching: {enabled: false, num_windows: 2, freeze_previous_windows: true, m_distribution: equal}

  schrodinger:
    pretrained_base_checkpoint: null
    spatial_dim: 1
    output_dim: 2
    spatial_domain: [[-5.0, 5.0]]
    temporal_domain: [0.0, 1.5707963267948966]
    wavelet_threshold: 0.1
    new_norm_threshold: 2.0
    tree_smoothness_threshold: 0.7
    window_type: smoothstep
    window_smoothness_order: 2
    loss_weights: {residual: 1.0, ic: 1.0, bc: 1.0, continuity: 0.0}
    causal_training: {enabled: false, num_chunks: 8, tol_schedule: [0.01, 0.1, 1.0], min_weight_threshold: 0.99}
    rwf: {enabled: false, mean: 1.0, std: 0.1}
    fourier_features: {enabled: false, dim: 16, scale: 1.0, periodic: false}
    init: {hidden: parent_weights, output: default, ls_use_bias: false}
    lra: {enabled: false, update_every: 20, alpha: 0.1, scheme: grad_norm, epsilon: 1.0e-5}
    adaptive_sampling: {enabled: false, adaptive_ratio: 0.3, phi: quadratic, phi_epsilon: 1.0, phi_power: 2.0}
    grad_clip_norm: null
    expert_grad_clip_norm: null
    time_marching: {enabled: false, num_windows: 2, freeze_previous_windows: true, m_distribution: equal}

  burgers1d:
    pretrained_base_checkpoint: null
    spatial_dim: 1
    output_dim: 1
    spatial_domain: [[-1.0, 1.0]]
    temporal_domain: [0.0, 1.0]
    nu: 0.01
    wavelet_threshold: 0.001
    new_norm_threshold: 0.015
    tree_smoothness_threshold: 0.5
    window_type: smoothstep
    window_smoothness_order: 2
    loss_weights: {residual: 1.0, ic: 1.0, bc: 1.0, continuity: 0.0}
    causal_training: {enabled: false, num_chunks: 8, tol_schedule: [0.01, 0.1, 1.0], min_weight_threshold: 0.99}
    rwf: {enabled: false, mean: 1.0, std: 0.1}
    fourier_features: {enabled: false, dim: 16, scale: 1.0, periodic: false}
    init: {hidden: default, output: default, ls_use_bias: false}
    lra: {enabled: false, update_every: 20, alpha: 0.1, scheme: grad_norm, epsilon: 1.0e-5}
    adaptive_sampling: {enabled: true, adaptive_ratio: 0.5, phi: quadratic, phi_epsilon: 1.0, phi_power: 2.0}
    grad_clip_norm: null
    expert_grad_clip_norm: null
    time_marching: {enabled: false, num_windows: 2, freeze_previous_windows: true, m_distribution: equal}

  kdv:
    pretrained_base_checkpoint: null
    spatial_dim: 1
    output_dim: 1
    spatial_domain: [[-1.0, 1.0]]
    temporal_domain: [0.0, 1.0]
    mu: 0.022
    wavelet_threshold: 0.0025
    new_norm_threshold: 0.2
    tree_smoothness_threshold: 0.4
    window_type: smoothstep
    window_smoothness_order: 3
    loss_weights: {residual: 1.0, ic: 1.0, bc: 1.0, continuity: 0.0}
    causal_training: {enabled: false, num_chunks: 8, tol_schedule: [0.01], min_weight_threshold: 0.99}
    rwf: {enabled: false, mean: 1.0, std: 0.1}
    fourier_features: {enabled: false, dim: 10, scale: 2.0, periodic: false}
    init: {hidden: parent_weights, output: default, ls_use_bias: false}
    lra: {enabled: false, update_every: 20, alpha: 0.1, scheme: grad_norm, epsilon: 1.0e-5}
    adaptive_sampling: {enabled: false, adaptive_ratio: 0.3, phi: quadratic, phi_epsilon: 1.0, phi_power: 2.0}
    grad_clip_norm: null
    expert_grad_clip_norm: null
    time_marching: {enabled: false, num_windows: 2, freeze_previous_windows: true, m_distribution: equal}

  ks:
    pretrained_base_checkpoint: null
    spatial_dim: 1
    output_dim: 1
    spatial_domain: [[0.0, 6.283185307179586]]
    temporal_domain: [0.0, 1.0]
    alpha: 6.25
    beta: 0.390625
    gamma: 0.00152587890625
    wavelet_threshold: 0.04
    new_norm_threshold: 10.0
    tree_smoothness_threshold: 0.3
    window_type: smoothstep
    window_smoothness_order: 4
    loss_weights: {residual: 1.0, ic: 1.0, bc: 1.0, continuity: 0.0}
    causal_training: {enabled: false, num_chunks: 8, tol_schedule: [0.01, 0.1, 1], min_weight_threshold: 0.99}
    rwf: {enabled: false, mean: 1.0, std: 0.1}
    fourier_features: {enabled: true, dim: 10, scale: 1.0, periodic: false}
    init: {hidden: parent_weights, output: default, ls_use_bias: false}
    lra: {enabled: false, update_every: 20, alpha: 0.1, scheme: grad_norm, epsilon: 1.0e-5}
    adaptive_sampling: {enabled: true, adaptive_ratio: 0.5, phi: quadratic, phi_epsilon: 1.0, phi_power: 2.0}
    grad_clip_norm: null
    expert_grad_clip_norm: null
    time_marching: {enabled: true, num_windows: 2, freeze_previous_windows: true, m_distribution: equal}

  sampling:
    n_residual_train: 1500
    sample_volume_ratio: 35
    n_initial_train: 64
    n_boundary_train: 64
    eval_train_ratio: 0.25
    resample_every_epochs: 1
    plot_samples_every: 30

  adaptive_pinn:
    enabled: true
    max_experts: 150
    variable_for_node_accept: norm
    variable_for_expert_size: norm
    AToE_threshold_capacity: null
    expert_type: mlp
    blending_mode: soft
    sigma_fraction: 0.2
    tree_max_depth: 15
    tree_min_samples_leaf: 20
    enable_timing: false
    enable_gradient_diagnostics: false
    M_experts_num: 4
    split_icbc: { enabled: true }

    initial_train:
      epochs: 60
      optimizer_1: adam
      optimizer_2: lbfgs
      optimizer_switch_epoch: 30
      lr: 0.001
      lr_schedule: none
      lr_decay_rate: 0.98
      lr_decay_steps: 1000
      lr_warmup_steps: 0

    fine_tune:
      epochs: 60
      optimizer_1: adam
      optimizer_2: lbfgs
      optimizer_switch_epoch: 30
      lr: 0.0001
      lr_schedule: none
      lr_decay_rate: 0.98
      lr_decay_steps: 1000
      lr_warmup_steps: 10
      l2sp_lambda: 0.0001             # exercise the L2-SP anchor path


experiments:
  - name: burgers_pretrained
    problem: burgers1d
    model: AToELeaves
    base_architecture: [2, 60, 60, 60, 60, 1]     # adopted from the checkpoint
    experts_architecture: [2, 20, 20, 20, 1]
    burgers1d:
      pretrained_base_checkpoint: "roots_checkpoints/burgers_root.pt"

  - name: burgers_lra_glorot_ls
    problem: burgers1d
    model: AToELeaves
    base_architecture: [2, 20, 20, 20, 1]
    experts_architecture: [2, 20, 20, 20, 1]
    burgers1d:
      lra: {enabled: true}
      init: {hidden: glorot, output: ls}

  - name: allen_cahn_causal
    problem: allen_cahn
    model: AToELeaves
    base_architecture: [2, 20, 20, 20, 1]
    experts_architecture: [2, 20, 20, 20, 1]
    allen_cahn:
      causal_training: {enabled: true}
      loss_weights: {continuity: 1.0}

  - name: kdv_rwf
    problem: kdv
    model: AToELeaves
    base_architecture: [2, 20, 20, 20, 1]
    experts_architecture: [2, 20, 20, 20, 1]
    kdv:
      rwf: {enabled: true}

  - name: ks_ff_timemarching
    problem: ks
    model: AToELeaves
    base_architecture: [2, 20, 20, 20, 1]
    experts_architecture: [2, 20, 20, 20, 1]

  - name: schrodinger_soap
    problem: schrodinger
    model: AToELeaves
    base_architecture: [2, 20, 20, 20, 2]
    experts_architecture: [2, 20, 20, 20, 2]
    optimizer_1: soap
    optimizer_2: null

  - name: burgers_ssbroyden
    problem: burgers1d
    model: AToELeaves
    base_architecture: [2, 16, 16, 1]
    experts_architecture: [2, 16, 16, 1]
    optimizer_2: ssbroyden

  - name: kdv_resnet
    problem: kdv
    model: AToELeaves
    base_architecture: [2, 20, 20, 20, 1]
    experts_architecture: [2, 20, 20, 20, 1]
    adaptive_pinn:
      expert_type: resnet
