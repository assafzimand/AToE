experiment_name: allen_cahn_M8_owner_imitator_balance
base_config:
  problem: allen_cahn
  model: AToELeaves
  activation: tanh
  precision: float64
  # Phase 3 = OWNER-IMITATOR training (docs/New_phase_3.tex): each expert
  # is owner (PDE residual + true IC/BC) on its hard tile and imitator
  # (Sobolev matching of the minted target u*) on its collar; the PoU
  # composition is readout only. 35k = 5k Adam + 30k SSBroyden; refresh
  # (resample + re-mint + SSBroyden reset) every
  # sampling.resample_every_epochs.
  epochs: 35000
  batch_size: 99999
  min_epochs: 1
  eval_every: 1000
  patience_intervals: 5
  patience_rel_delta: 0.001
  optimizer_1: adam
  optimizer_2: ssbroyden
  optimizer_switch_epoch: 5000
  lr: 0.001
  lr_schedule: none
  lr_decay_rate: 0.98
  lr_decay_steps: 1000
  lr_warmup_steps: 0
  lr_warmup_start_factor: 0.01
  adam:
    betas:
    - 0.9
    - 0.999
    eps: 1.0e-08
  lbfgs:
    lr: 1.0
    max_iter: 1
    history_size: 100
    line_search: strong_wolfe
    tolerance_grad: 0.0
    tolerance_change: 0.0
  ssbroyden:
    lr: 1.0
    tolerance_grad: 1.0e-10
  soap:
    betas:
    - 0.95
    - 0.95
    precondition_frequency: 10
    weight_decay: 0.0
  cuda: true
  eval_only: false
  resume_from: null
  print_every: 1000
  save_every: 999999
  seed: 42
  allen_cahn:
    pretrained_base_checkpoint: roots_checkpoints/allen_cahn_root.pt
    spatial_dim: 1
    output_dim: 1
    spatial_domain:
    - - -1.0
      - 1.0
    temporal_domain:
    - 0.0
    - 1.0
    D: 0.0001
    wavelet_threshold: 0.002
    new_norm_threshold: 0.04
    tree_smoothness_threshold: 0.5
    window_type: smoothstep
    window_smoothness_order: 2
    loss_weights:
      residual: 1.0
      ic: 1.0
      bc: 1.0
      continuity: 0.0
    causal_training:
      enabled: false
      num_chunks: 32
      tol_schedule:
      - 0.01
      - 0.1
      - 1.0
      min_weight_threshold: 0.99
    rwf:
      enabled: false
      mean: 1.0
      std: 0.1
    fourier_features:
      enabled: false
      dim: 10
      scale: 3.0
      periodic: false
    init:
      hidden: default
      output: default
      ls_use_bias: false
    lra:
      enabled: false
      update_every: 100
      alpha: 0.1
      scheme: grad_norm
      epsilon: 1.0e-05
    adaptive_sampling:
      enabled: false
      adaptive_ratio: 0.3
      phi: quadratic
      phi_epsilon: 1.0
      phi_power: 2.0
    grad_clip_norm: null
    expert_grad_clip_norm: null
    time_marching:
      enabled: false
      num_windows: 5
      freeze_previous_windows: true
      m_distribution: quadratic
  schrodinger:
    pretrained_base_checkpoint: null
    spatial_dim: 1
    output_dim: 2
    spatial_domain:
    - - -5.0
      - 5.0
    temporal_domain:
    - 0.0
    - 1.5707963267948966
    wavelet_threshold: 0.1
    new_norm_threshold: 2.0
    tree_smoothness_threshold: 0.7
    window_type: smoothstep
    window_smoothness_order: 2
    loss_weights:
      residual: 1.0
      ic: 1.0
      bc: 1.0
      continuity: 0.0
    causal_training:
      enabled: false
      num_chunks: 32
      tol_schedule:
      - 0.01
      - 0.1
      - 1.0
      min_weight_threshold: 0.99
    rwf:
      enabled: false
      mean: 1.0
      std: 0.1
    fourier_features:
      enabled: false
      dim: 128
      scale: 1.0
      periodic: false
    init:
      hidden: default
      output: default
      ls_use_bias: false
    lra:
      enabled: false
      update_every: 100
      alpha: 0.1
      scheme: grad_norm
      epsilon: 1.0e-05
    adaptive_sampling:
      enabled: false
      adaptive_ratio: 0.3
      phi: quadratic
      phi_epsilon: 1.0
      phi_power: 2.0
    grad_clip_norm: null
    expert_grad_clip_norm: null
    time_marching:
      enabled: false
      num_windows: 5
      freeze_previous_windows: true
      m_distribution: quadratic
  burgers1d:
    pretrained_base_checkpoint: null
    spatial_dim: 1
    output_dim: 1
    spatial_domain:
    - - -1.0
      - 1.0
    temporal_domain:
    - 0.0
    - 1.0
    nu: 0.01
    wavelet_threshold: 0.001
    new_norm_threshold: 0.015
    tree_smoothness_threshold: 0.5
    window_type: smoothstep
    window_smoothness_order: 2
    loss_weights:
      residual: 1.0
      ic: 1.0
      bc: 1.0
      continuity: 0.0
    causal_training:
      enabled: false
      num_chunks: 32
      tol_schedule:
      - 0.01
      - 0.1
      - 1.0
      min_weight_threshold: 0.99
    rwf:
      enabled: false
      mean: 1.0
      std: 0.1
    fourier_features:
      enabled: false
      dim: 128
      scale: 1.0
      periodic: false
    init:
      hidden: default
      output: default
      ls_use_bias: false
    lra:
      enabled: false
      update_every: 100
      alpha: 0.1
      scheme: grad_norm
      epsilon: 1.0e-05
    adaptive_sampling:
      enabled: false
      adaptive_ratio: 0.5
      phi: quadratic
      phi_epsilon: 1.0
      phi_power: 2.0
    grad_clip_norm: null
    expert_grad_clip_norm: null
    time_marching:
      enabled: false
      num_windows: 5
      freeze_previous_windows: true
      m_distribution: quadratic
  kdv:
    pretrained_base_checkpoint: null
    spatial_dim: 1
    output_dim: 1
    spatial_domain:
    - - -1.0
      - 1.0
    temporal_domain:
    - 0.0
    - 1.0
    mu: 0.022
    wavelet_threshold: 0.0025
    new_norm_threshold: 0.2
    tree_smoothness_threshold: 0.4
    window_type: smoothstep
    window_smoothness_order: 3
    loss_weights:
      residual: 1.0
      ic: 1.0
      bc: 1.0
      continuity: 0.0
    causal_training:
      enabled: false
      num_chunks: 16
      tol_schedule:
      - 0.01
      min_weight_threshold: 0.99
    rwf:
      enabled: false
      mean: 1.0
      std: 0.1
    fourier_features:
      enabled: false
      dim: 10
      scale: 2.0
      periodic: false
    init:
      hidden: default
      output: default
      ls_use_bias: false
    lra:
      enabled: false
      update_every: 1000
      alpha: 0.1
      scheme: grad_norm
      epsilon: 1.0e-05
    adaptive_sampling:
      enabled: false
      adaptive_ratio: 0.3
      phi: quadratic
      phi_epsilon: 1.0
      phi_power: 2.0
    grad_clip_norm: null
    expert_grad_clip_norm: null
    time_marching:
      enabled: false
      num_windows: 4
      freeze_previous_windows: true
      m_distribution: quadratic
  ks:
    pretrained_base_checkpoint: null
    spatial_dim: 1
    output_dim: 1
    spatial_domain:
    - - 0.0
      - 6.283185307179586
    temporal_domain:
    - 0.0
    - 1.0
    alpha: 6.25
    beta: 0.390625
    gamma: 0.00152587890625
    wavelet_threshold: 0.04
    new_norm_threshold: 10.0
    tree_smoothness_threshold: 0.3
    window_type: smoothstep
    window_smoothness_order: 4
    loss_weights:
      residual: 1.0
      ic: 1.0
      bc: 1.0
      continuity: 0.0
    causal_training:
      enabled: false
      num_chunks: 32
      tol_schedule:
      - 0.01
      - 0.1
      - 1
      min_weight_threshold: 0.99
    rwf:
      enabled: false
      mean: 1.0
      std: 0.1
    fourier_features:
      enabled: false
      dim: 10
      scale: 1.0
      periodic: false
    init:
      hidden: default
      output: default
      ls_use_bias: false
    lra:
      enabled: false
      update_every: 100
      alpha: 0.1
      scheme: grad_norm
      epsilon: 1.0e-05
    adaptive_sampling:
      enabled: false
      adaptive_ratio: 0.5
      phi: quadratic
      phi_epsilon: 1.0
      phi_power: 2.0
    grad_clip_norm: null
    expert_grad_clip_norm: null
    time_marching:
      enabled: false
      num_windows: 10
      freeze_previous_windows: true
      m_distribution: quadratic
  sampling:
    n_residual_train: 10000
    sample_volume_ratio: 35
    n_initial_train: 256
    n_boundary_train: 256
    # Owner-imitator refresh cadence R: at every resample the points are
    # redrawn, lambda steps toward mint_lambda_min, minted targets are
    # re-baked from the live weights, and SSBroyden state is RESET (each
    # inner solve starts with empty curvature memory — unlike the old
    # warm-start-across-resamples behavior). R=2500 -> 13 refreshes over
    # 35k: fewer, DEEPER inner solves (R=1000 blocks were cold-started
    # quasi-Newton runs too shallow to converge each inner problem).
    # NOTE: patience interval = R, so patience_intervals: 5 = 12.5k flat
    # epochs — early stop is effectively off in this segment.
    resample_every_epochs: 2500
    plot_samples_every: 1000
  adaptive_pinn:
    enabled: true
    max_experts: 150
    variable_for_node_accept: norm
    variable_for_expert_size: norm
    AToE_threshold_capacity: null
    expert_type: mlp
    blending_mode: soft
    sigma_fraction: 0.2
    per_leaf_normalization: true
    tree_max_depth: 15
    tree_min_samples_leaf: 50
    enable_timing: false
    enable_gradient_diagnostics: false
    M_experts_num: 8
    epsilon_node_acceptance: 0.00
    # Owner-imitator phase 3 (docs/New_phase_3.tex): every loss term on
    # the expert's OWN output (owner physics on its tile, Sobolev
    # imitation of the minted target u* on its collar); the composition
    # is readout only. Refresh cadence = sampling.resample_every_epochs.
    owner_imitator:
      enabled: true
      # Homotopy floor: lambda steps 1 -> mint_lambda_min linearly over
      # the refresh events (1 = pure root anchoring, 0 = full owner
      # exchange).
      mint_lambda_min: 0.0
      # The linear ramp completes epochs_on_min_lambda epochs before the
      # segment ends; the remaining refreshes hold lambda_min (pure
      # exchange window). 20000 with R=2500 -> ramp over refreshes 1..5
      # (lambda 0.8/0.6/0.4/0.2/0.0, done at epoch 12501), then 8
      # refreshes at lambda_min = 8 real Jacobi-Schwarz exchanges. OI1
      # showed the experts glue to the root by ~6k anyway — the long
      # ramp spent refreshes protecting nothing.
      # 0 = old behavior (ramp spans all refreshes).
      epochs_on_min_lambda: 20000
      # Sobolev matching order q: 0 = imitation matches neighbor VALUES
      # only. OI1 diagnosis: with q=1 the unweighted u_x/u_t slots
      # concentrate the imitation gradient on the sharp x=+-0.5
      # interfaces where the root's derivative is worst (E0/E1 = worst
      # own-tile RMS in the model); seams hold only ~5% of the error,
      # so derivative matching wasn't earning its keep.
      imit_derivative_order: 0
      # Per-slot weights w_alpha, length 2q+1; null = all 1.0. With q=0
      # this is THE imitation term weight: 0.3 flips the endgame from
      # imit = 2.4x all physics terms (the consensus anchor that locked
      # OI1 at the root) to ~0.7x, while early distillation at lambda=1
      # (27x dominant) stays comfortably dominant.
      imit_weights: [0.3]
    initial_train:
      epochs: 45000
      optimizer_1: adam
      optimizer_2: ssbroyden
      optimizer_switch_epoch: 5000
      lr: 0.001
      lr_schedule: none
      lr_decay_rate: 0.98
      lr_decay_steps: 1000
      lr_warmup_steps: 0
    # Fine-tune 5k pure SSBroyden (no Adam stage; optimizer_2 null means
    # no switch): classic PINN loss on u_theta. N1 proved the fine-tune is
    # a no-op under the exact-object phase 3 (best at its FIRST epoch), so
    # 5k is a polish budget, not a repair budget.
    fine_tune:
      epochs: 5000
      optimizer_1: ssbroyden
      optimizer_2: null
      optimizer_switch_epoch: 99999
      lr: 0.0001
      lr_schedule: none
      lr_decay_rate: 0.98
      lr_decay_steps: 1000
      lr_warmup_steps: 0
      l2sp_lambda: 0.0
      collar_data_ratio: 0.0
# Round 7 (2026-07-13): IMITATION REBALANCE. Round-6 diagnosis (OI1-OI3
# + hard-indicator re-eval): mechanics all correct, but (a) the
# imitation term ended at 2.4x ALL physics terms combined with a floor
# set by target inconsistency (~5e-5 RMS = the error plateau) - late
# gradients said "track the consensus", locking every expert at the
# root; (b) with q=1 the unweighted u_x/u_t slots focused that anchor
# on the x=+-0.5 interfaces (E0/E1 worst experts); (c) hard vs soft
# readout differ by ~1% - seams/blending are NOT the problem, error is
# tile-interior; (d) mean|u*-root| froze at ~1.7e-4 from refresh #6 -
# the exchange window never exchanged anything new.
#   Diff vs OI1 is exactly {q=0, w_imit=0.3, lambda=0 by ep 12501,
# R=2500}: value-only imitation as a soft tether, physics dominates the
# endgame, 8 deep 2500-epoch SSBroyden exchanges at lambda=0. Physics
# recipe untouched (res=ic=bc=1, uniform 10k points - same as root).
#   Success signals: pre-refresh imit plateau BELOW the physics sum;
# mean|u*-root| GROWING across the lambda=0 refreshes; E0/E1 own-tile
# RMS (scripts/eval_phase3_hard_indicators.py) dropping toward the
# ~5e-6 of the good experts.
# Reference points: root 3.0e-5; OI1 SANITY (lambda=1) phase3 3.74e-5 /
# FT 3.35e-5; OI1 (lambda->0) phase3 4.05e-5 / FT 3.50e-5; OI2 (M=5)
# 4.78e-5/3.90e-5; OI3 (collar FT 0.8) 2.96e-5 (only sub-root); main
# hard-indicator phase 3 3.4e-6.
experiments:
- name: OI4_imit_rebalanced
  problem: allen_cahn
  model: AToELeaves
  base_architecture:
  - 2
  - 60
  - 60
  - 60
  - 60
  - 1
  experts_architecture:
  - 2
  - 20
  - 20
  - 20
  - 1
  adaptive_pinn:
    fine_tune:
      collar_data_ratio: 0.0

