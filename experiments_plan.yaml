experiment_name: allen_cahn_M8_owner_imitator
base_config:
  problem: allen_cahn
  model: AToELeaves
  activation: tanh
  precision: float64
  # Phase 3 = OWNER-IMITATOR training (docs/New_phase_3.tex): each expert
  # is owner (PDE residual + true IC/BC) on its hard tile and imitator
  # (Sobolev matching of the minted target u*) on its collar; the PoU
  # composition is readout only. 35k = 5k Adam + 30k SSBroyden; refresh
  # (resample + re-mint + SSBroyden reset) every
  # sampling.resample_every_epochs.
  epochs: 35000
  batch_size: 99999
  min_epochs: 1
  eval_every: 1000
  patience_intervals: 5
  patience_rel_delta: 0.001
  optimizer_1: adam
  optimizer_2: ssbroyden
  optimizer_switch_epoch: 5000
  lr: 0.001
  lr_schedule: none
  lr_decay_rate: 0.98
  lr_decay_steps: 1000
  lr_warmup_steps: 0
  lr_warmup_start_factor: 0.01
  adam:
    betas:
    - 0.9
    - 0.999
    eps: 1.0e-08
  lbfgs:
    lr: 1.0
    max_iter: 1
    history_size: 100
    line_search: strong_wolfe
    tolerance_grad: 0.0
    tolerance_change: 0.0
  ssbroyden:
    lr: 1.0
    tolerance_grad: 1.0e-10
  soap:
    betas:
    - 0.95
    - 0.95
    precondition_frequency: 10
    weight_decay: 0.0
  cuda: true
  eval_only: false
  resume_from: null
  print_every: 1000
  save_every: 999999
  seed: 42
  allen_cahn:
    pretrained_base_checkpoint: roots_checkpoints/allen_cahn_root.pt
    spatial_dim: 1
    output_dim: 1
    spatial_domain:
    - - -1.0
      - 1.0
    temporal_domain:
    - 0.0
    - 1.0
    D: 0.0001
    wavelet_threshold: 0.002
    new_norm_threshold: 0.04
    tree_smoothness_threshold: 0.5
    window_type: smoothstep
    window_smoothness_order: 2
    loss_weights:
      residual: 1.0
      ic: 1.0
      bc: 1.0
      continuity: 0.0
    causal_training:
      enabled: false
      num_chunks: 32
      tol_schedule:
      - 0.01
      - 0.1
      - 1.0
      min_weight_threshold: 0.99
    rwf:
      enabled: false
      mean: 1.0
      std: 0.1
    fourier_features:
      enabled: false
      dim: 10
      scale: 3.0
      periodic: false
    init:
      hidden: default
      output: default
      ls_use_bias: false
    lra:
      enabled: false
      update_every: 100
      alpha: 0.1
      scheme: grad_norm
      epsilon: 1.0e-05
    adaptive_sampling:
      enabled: false
      adaptive_ratio: 0.3
      phi: quadratic
      phi_epsilon: 1.0
      phi_power: 2.0
    grad_clip_norm: null
    expert_grad_clip_norm: null
    time_marching:
      enabled: false
      num_windows: 5
      freeze_previous_windows: true
      m_distribution: quadratic
  schrodinger:
    pretrained_base_checkpoint: null
    spatial_dim: 1
    output_dim: 2
    spatial_domain:
    - - -5.0
      - 5.0
    temporal_domain:
    - 0.0
    - 1.5707963267948966
    wavelet_threshold: 0.1
    new_norm_threshold: 2.0
    tree_smoothness_threshold: 0.7
    window_type: smoothstep
    window_smoothness_order: 2
    loss_weights:
      residual: 1.0
      ic: 1.0
      bc: 1.0
      continuity: 0.0
    causal_training:
      enabled: false
      num_chunks: 32
      tol_schedule:
      - 0.01
      - 0.1
      - 1.0
      min_weight_threshold: 0.99
    rwf:
      enabled: false
      mean: 1.0
      std: 0.1
    fourier_features:
      enabled: false
      dim: 128
      scale: 1.0
      periodic: false
    init:
      hidden: default
      output: default
      ls_use_bias: false
    lra:
      enabled: false
      update_every: 100
      alpha: 0.1
      scheme: grad_norm
      epsilon: 1.0e-05
    adaptive_sampling:
      enabled: false
      adaptive_ratio: 0.3
      phi: quadratic
      phi_epsilon: 1.0
      phi_power: 2.0
    grad_clip_norm: null
    expert_grad_clip_norm: null
    time_marching:
      enabled: false
      num_windows: 5
      freeze_previous_windows: true
      m_distribution: quadratic
  burgers1d:
    pretrained_base_checkpoint: null
    spatial_dim: 1
    output_dim: 1
    spatial_domain:
    - - -1.0
      - 1.0
    temporal_domain:
    - 0.0
    - 1.0
    nu: 0.01
    wavelet_threshold: 0.001
    new_norm_threshold: 0.015
    tree_smoothness_threshold: 0.5
    window_type: smoothstep
    window_smoothness_order: 2
    loss_weights:
      residual: 1.0
      ic: 1.0
      bc: 1.0
      continuity: 0.0
    causal_training:
      enabled: false
      num_chunks: 32
      tol_schedule:
      - 0.01
      - 0.1
      - 1.0
      min_weight_threshold: 0.99
    rwf:
      enabled: false
      mean: 1.0
      std: 0.1
    fourier_features:
      enabled: false
      dim: 128
      scale: 1.0
      periodic: false
    init:
      hidden: default
      output: default
      ls_use_bias: false
    lra:
      enabled: false
      update_every: 100
      alpha: 0.1
      scheme: grad_norm
      epsilon: 1.0e-05
    adaptive_sampling:
      enabled: false
      adaptive_ratio: 0.5
      phi: quadratic
      phi_epsilon: 1.0
      phi_power: 2.0
    grad_clip_norm: null
    expert_grad_clip_norm: null
    time_marching:
      enabled: false
      num_windows: 5
      freeze_previous_windows: true
      m_distribution: quadratic
  kdv:
    pretrained_base_checkpoint: null
    spatial_dim: 1
    output_dim: 1
    spatial_domain:
    - - -1.0
      - 1.0
    temporal_domain:
    - 0.0
    - 1.0
    mu: 0.022
    wavelet_threshold: 0.0025
    new_norm_threshold: 0.2
    tree_smoothness_threshold: 0.4
    window_type: smoothstep
    window_smoothness_order: 3
    loss_weights:
      residual: 1.0
      ic: 1.0
      bc: 1.0
      continuity: 0.0
    causal_training:
      enabled: false
      num_chunks: 16
      tol_schedule:
      - 0.01
      min_weight_threshold: 0.99
    rwf:
      enabled: false
      mean: 1.0
      std: 0.1
    fourier_features:
      enabled: false
      dim: 10
      scale: 2.0
      periodic: false
    init:
      hidden: default
      output: default
      ls_use_bias: false
    lra:
      enabled: false
      update_every: 1000
      alpha: 0.1
      scheme: grad_norm
      epsilon: 1.0e-05
    adaptive_sampling:
      enabled: false
      adaptive_ratio: 0.3
      phi: quadratic
      phi_epsilon: 1.0
      phi_power: 2.0
    grad_clip_norm: null
    expert_grad_clip_norm: null
    time_marching:
      enabled: false
      num_windows: 4
      freeze_previous_windows: true
      m_distribution: quadratic
  ks:
    pretrained_base_checkpoint: null
    spatial_dim: 1
    output_dim: 1
    spatial_domain:
    - - 0.0
      - 6.283185307179586
    temporal_domain:
    - 0.0
    - 1.0
    alpha: 6.25
    beta: 0.390625
    gamma: 0.00152587890625
    wavelet_threshold: 0.04
    new_norm_threshold: 10.0
    tree_smoothness_threshold: 0.3
    window_type: smoothstep
    window_smoothness_order: 4
    loss_weights:
      residual: 1.0
      ic: 1.0
      bc: 1.0
      continuity: 0.0
    causal_training:
      enabled: false
      num_chunks: 32
      tol_schedule:
      - 0.01
      - 0.1
      - 1
      min_weight_threshold: 0.99
    rwf:
      enabled: false
      mean: 1.0
      std: 0.1
    fourier_features:
      enabled: false
      dim: 10
      scale: 1.0
      periodic: false
    init:
      hidden: default
      output: default
      ls_use_bias: false
    lra:
      enabled: false
      update_every: 100
      alpha: 0.1
      scheme: grad_norm
      epsilon: 1.0e-05
    adaptive_sampling:
      enabled: false
      adaptive_ratio: 0.5
      phi: quadratic
      phi_epsilon: 1.0
      phi_power: 2.0
    grad_clip_norm: null
    expert_grad_clip_norm: null
    time_marching:
      enabled: false
      num_windows: 10
      freeze_previous_windows: true
      m_distribution: quadratic
  sampling:
    n_residual_train: 10000
    sample_volume_ratio: 35
    n_initial_train: 256
    n_boundary_train: 256
    # Owner-imitator refresh cadence R: at every resample the points are
    # redrawn, lambda steps toward mint_lambda_min, minted targets are
    # re-baked from the live weights, and SSBroyden state is RESET (each
    # inner solve starts with empty curvature memory — unlike the old
    # warm-start-across-resamples behavior). R=1000 -> 34 refreshes over
    # 35k; 30 SSBroyden inner solves of 1000 epochs each. NOTE: patience
    # interval = R, so patience_intervals: 5 = early stop after 5 flat
    # 1000-epoch intervals (active).
    resample_every_epochs: 1000
    plot_samples_every: 1000
  adaptive_pinn:
    enabled: true
    max_experts: 150
    variable_for_node_accept: norm
    variable_for_expert_size: norm
    AToE_threshold_capacity: null
    expert_type: mlp
    blending_mode: soft
    sigma_fraction: 0.2
    per_leaf_normalization: true
    tree_max_depth: 15
    tree_min_samples_leaf: 50
    enable_timing: false
    enable_gradient_diagnostics: false
    M_experts_num: 8
    epsilon_node_acceptance: 0.00
    # Owner-imitator phase 3 (docs/New_phase_3.tex): every loss term on
    # the expert's OWN output (owner physics on its tile, Sobolev
    # imitation of the minted target u* on its collar); the composition
    # is readout only. Refresh cadence = sampling.resample_every_epochs.
    owner_imitator:
      enabled: true
      # Homotopy floor: lambda steps 1 -> mint_lambda_min linearly over
      # the refresh events (1 = pure root anchoring, 0 = full owner
      # exchange).
      mint_lambda_min: 0.0
      # The linear ramp completes epochs_on_min_lambda epochs before the
      # segment ends; the remaining refreshes hold lambda_min (pure
      # exchange window). 5000 with R=1000 -> ramp over refreshes
      # 1..29 (epochs 1001..29001), then 5 refreshes at lambda_min.
      # 0 = old behavior (ramp spans all refreshes).
      epochs_on_min_lambda: 5000
      # Sobolev matching order q: imitation matches value + d^p/dx^p +
      # d^p/dt^p for p <= q. Default 1 (= m-1 for the 2nd-order PDEs);
      # raise toward m-1 for kdv/ks if seams underperform.
      imit_derivative_order: 1
      # Optional per-slot weights w_alpha, length 2q+1; null = all 1.0.
      imit_weights: null
    initial_train:
      epochs: 45000
      optimizer_1: adam
      optimizer_2: ssbroyden
      optimizer_switch_epoch: 5000
      lr: 0.001
      lr_schedule: none
      lr_decay_rate: 0.98
      lr_decay_steps: 1000
      lr_warmup_steps: 0
    # Fine-tune 5k pure SSBroyden (no Adam stage; optimizer_2 null means
    # no switch): classic PINN loss on u_theta. N1 proved the fine-tune is
    # a no-op under the exact-object phase 3 (best at its FIRST epoch), so
    # 5k is a polish budget, not a repair budget.
    fine_tune:
      epochs: 5000
      optimizer_1: ssbroyden
      optimizer_2: null
      optimizer_switch_epoch: 99999
      lr: 0.0001
      lr_schedule: none
      lr_decay_rate: 0.98
      lr_decay_steps: 1000
      lr_warmup_steps: 0
      l2sp_lambda: 0.0
      collar_data_ratio: 0.0
# Round 6 (2026-07-13): OWNER-IMITATOR phase 3 (docs/New_phase_3.tex),
# lambda_min = 0 runs (full owner exchange). Every loss term on the
# expert's OWN raw output u_j: PDE residual on its hard tile, true IC
# (t=0) / mirror-minted periodic matching (value + u_x) on the BC
# dataset rows, and Sobolev imitation (value + u_x + u_t, q=1) of the
# minted target u* = lambda*u0 + (1-lambda)*sg[u_owner] on its collar.
# NO loss on the composition - it is readout only.
#   Phase 3 = 5k Adam + 30k SSBroyden, refresh every R=1000 (34
# refreshes); lambda ramps 1 -> 0 over refreshes 1..29 (epoch 29001),
# then epochs_on_min_lambda=5000 holds lambda=0 for the last 5 refreshes
# (pure Jacobi-Schwarz exchange window). Watch mean|u* - root| in the
# refresh logs - it must grow from 0 as the owners depart from the root.
#   OI1: M=8 headline (lambda 0 vs the completed lambda=1 sanity, same
# tree). OI2: M=5 capacity point. OI3: same phase 3 as OI1 (also a
# reproducibility check, seed 42) but fine-tune 10k with
# collar_data_ratio 0.8 (80% of fine-tune residual points on the
# collars) - probes whether collar-focused fine-tune matters.
# Reference points: OI1 SANITY (lambda=1) phase3 3.74e-5 / FT 3.35e-5;
# N1_clean 3.50e-5; R1 3.17e-5/2.97e-5; root 3.0e-5; main
# hard-indicator phase 3 3.4e-6.
experiments:
- name: OI1_owner_imitator
  problem: allen_cahn
  model: AToELeaves
  base_architecture:
  - 2
  - 60
  - 60
  - 60
  - 60
  - 1
  experts_architecture:
  - 2
  - 20
  - 20
  - 20
  - 1
  adaptive_pinn:
    fine_tune:
      collar_data_ratio: 0.0

- name: OI2_owner_imitator_M5
  problem: allen_cahn
  model: AToELeaves
  base_architecture:
  - 2
  - 60
  - 60
  - 60
  - 60
  - 1
  experts_architecture:
  - 2
  - 20
  - 20
  - 20
  - 1
  adaptive_pinn:
    M_experts_num: 5
    fine_tune:
      collar_data_ratio: 0.0

- name: OI3_owner_imitator_collar
  problem: allen_cahn
  model: AToELeaves
  base_architecture:
  - 2
  - 60
  - 60
  - 60
  - 60
  - 1
  experts_architecture:
  - 2
  - 20
  - 20
  - 20
  - 1
  adaptive_pinn:
    fine_tune:
      collar_data_ratio: 0.8
      epochs: 10000