      freeze_previous_windows: true
      m_distribution: quadratic
  ks:
    pretrained_base_checkpoint: null
    spatial_dim: 1
    output_dim: 1
    spatial_domain:
    - - 0.0
      - 6.283185307179586
    temporal_domain:
    - 0.0
    - 1.0
    alpha: 6.25
    beta: 0.390625
    gamma: 0.00152587890625
    wavelet_threshold: 0.04
    new_norm_threshold: 10.0
    tree_smoothness_threshold: 0.3
    window_type: smoothstep
    window_smoothness_order: 4
    loss_weights:
      residual: 1.0
      ic: 1.0
      bc: 1.0
      continuity: 0.0
    causal_training:
      enabled: false
      num_chunks: 32
      tol_schedule:
      - 0.01
      - 0.1
      - 1
      min_weight_threshold: 0.99
    rwf:
      enabled: false
      mean: 1.0
      std: 0.1
    fourier_features:
      enabled: false
      dim: 10
      scale: 1.0
      periodic: false
    init:
      hidden: default
      output: default
      ls_use_bias: false
    lra:
      enabled: false
      update_every: 100
      alpha: 0.1
      scheme: grad_norm
      epsilon: 1.0e-05
    adaptive_sampling:
      enabled: false
      adaptive_ratio: 0.5
      phi: quadratic
      phi_epsilon: 1.0
      phi_power: 2.0
    grad_clip_norm: null
    expert_grad_clip_norm: null
    time_marching:
      enabled: false
      num_windows: 10
      freeze_previous_windows: true
      m_distribution: quadratic
  sampling:
    n_residual_train: 10000
    sample_volume_ratio: 35
    n_initial_train: 256
    n_boundary_train: 256
    resample_every_epochs: 500
    plot_samples_every: 1000
  adaptive_pinn:
    enabled: true
    max_experts: 150
    variable_for_node_accept: norm
    variable_for_expert_size: norm
    AToE_threshold_capacity: null
    expert_type: mlp
    blending_mode: soft
    sigma_fraction: 0.2
    per_leaf_normalization: true
    tree_max_depth: 15
    tree_min_samples_leaf: 50
    enable_timing: false
    enable_gradient_diagnostics: false
    M_experts_num: 8
    epsilon_node_acceptance: 0.00
    split_icbc:
      enabled: true
    initial_train:
      epochs: 45000
      optimizer_1: adam
      optimizer_2: ssbroyden
      optimizer_switch_epoch: 5000
      lr: 0.001
      lr_schedule: none
      lr_decay_rate: 0.98
      lr_decay_steps: 1000
      lr_warmup_steps: 0
    # Fine-tune 5k pure SSBroyden (no Adam stage; optimizer_2 null means
    # no switch): classic PINN loss on u_theta. N1 proved the fine-tune is
    # a no-op under the exact-object phase 3 (best at its FIRST epoch), so
    # 5k is a polish budget, not a repair budget.
    fine_tune:
      epochs: 5000
      optimizer_1: ssbroyden
      optimizer_2: null
      optimizer_switch_epoch: 99999
      lr: 0.0001
      lr_schedule: none
      lr_decay_rate: 0.98
      lr_decay_steps: 1000
      lr_warmup_steps: 0
      l2sp_lambda: 0.0
      collar_data_ratio: 0.0
# Round 4 (2026-07-11): GROUPED exact-object phase-3 loss. Same scheme as
# N1_clean (composed residual, u0 guides on exclusive-box interior faces,
# exact IC/BC on the composition) with ONE change: the residual is a sum
# of per-group means - one mean per expert's solo zone (where
# u_theta == u_j, i.e. its well-posed local problem) + one collar mean -
# instead of N1's single global mean. Restores the per-region weighting
# of the pre-redesign loss (small high-detail zones get ~25-100x per-point
# weight back). Same pretrained root (rel-L2 3.0e-5), M=8, phase 3 = 35k
# (5k Adam + 30k SSBroyden), fine-tune = 5k pure SSBroyden (classic PINN
# on u_theta - N1 showed FT is a no-op under the exact-object phase 3).
#   N2 - clean: no interface anneal, no collar sampling.
# Reference points: N1_clean 3.50e-5 (plateau ~19.5k, loss 2e-13); R1
# (old per-expert loss, had this weighting) 3.17e-5 phase 3 / 2.97e-5 FT;
# root 3.0e-5; main hard-indicator phase 3 3.4e-6.
experiments:
- name: N2_grouped_res
  problem: allen_cahn
  model: AToELeaves
  base_architecture:
  - 2
  - 60
  - 60
  - 60
  - 60
  - 1
  experts_architecture:
  - 2
  - 20
  - 20
  - 20
  - 1
  adaptive_pinn:
    fine_tune:
      collar_data_ratio: 0.0