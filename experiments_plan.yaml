experiment_name: allen_cahn_M8_interface_anneal_collar_data_ablation
base_config:
  problem: allen_cahn
  model: AToELeaves
  activation: tanh
  precision: float64
  epochs: 45000
  batch_size: 99999
  min_epochs: 1
  eval_every: 500
  patience_intervals: 10
  patience_rel_delta: 0.001
  optimizer_1: adam
  optimizer_2: ssbroyden
  optimizer_switch_epoch: 5000
  lr: 0.001
  lr_schedule: none
  lr_decay_rate: 0.98
  lr_decay_steps: 1000
  lr_warmup_steps: 0
  lr_warmup_start_factor: 0.01
  adam:
    betas:
    - 0.9
    - 0.999
    eps: 1.0e-08
  lbfgs:
    lr: 1.0
    max_iter: 1
    history_size: 100
    line_search: strong_wolfe
    tolerance_grad: 0.0
    tolerance_change: 0.0
  ssbroyden:
    lr: 1.0
    tolerance_grad: 1.0e-10
  soap:
    betas:
    - 0.95
    - 0.95
    precondition_frequency: 10
    weight_decay: 0.0
  cuda: true
  eval_only: false
  resume_from: null
  print_every: 1000
  save_every: 999999
  seed: 42
  allen_cahn:
    pretrained_base_checkpoint: roots_checkpoints/allen_cahn_root.pt
    spatial_dim: 1
    output_dim: 1
    spatial_domain:
    - - -1.0
      - 1.0
    temporal_domain:
    - 0.0
    - 1.0
    D: 0.0001
    wavelet_threshold: 0.002
    new_norm_threshold: 0.04
    tree_smoothness_threshold: 0.5
    window_type: smoothstep
    window_smoothness_order: 2
    loss_weights:
      residual: 1.0
      ic: 1.0
      bc: 1.0
      continuity: 0.0
    causal_training:
      enabled: false
      num_chunks: 32
      tol_schedule:
      - 0.01
      - 0.1
      - 1.0
      min_weight_threshold: 0.99
    rwf:
      enabled: false
      mean: 1.0
      std: 0.1
    fourier_features:
      enabled: false
      dim: 10
      scale: 3.0
      periodic: false
    init:
      hidden: default
      output: default
      ls_use_bias: false
    lra:
      enabled: false
      update_every: 100
      alpha: 0.1
      scheme: grad_norm
      epsilon: 1.0e-05
    adaptive_sampling:
      enabled: false
      adaptive_ratio: 0.3
      phi: quadratic
      phi_epsilon: 1.0
      phi_power: 2.0
    grad_clip_norm: null
    expert_grad_clip_norm: null
    time_marching:
      enabled: false
      num_windows: 5
      freeze_previous_windows: true
      m_distribution: quadratic
  schrodinger:
    pretrained_base_checkpoint: null
    spatial_dim: 1
    output_dim: 2
    spatial_domain:
    - - -5.0
      - 5.0
    temporal_domain:
    - 0.0
    - 1.5707963267948966
    wavelet_threshold: 0.1
    new_norm_threshold: 2.0
    tree_smoothness_threshold: 0.7
    window_type: smoothstep
    window_smoothness_order: 2
    loss_weights:
      residual: 1.0
      ic: 1.0
      bc: 1.0
      continuity: 0.0
    causal_training:
      enabled: false
      num_chunks: 32
      tol_schedule:
      - 0.01
      - 0.1
      - 1.0
      min_weight_threshold: 0.99
    rwf:
      enabled: false
      mean: 1.0
      std: 0.1
    fourier_features:
      enabled: false
      dim: 128
      scale: 1.0
      periodic: false
    init:
      hidden: default
      output: default
      ls_use_bias: false
    lra:
      enabled: false
      update_every: 100
      alpha: 0.1
      scheme: grad_norm
      epsilon: 1.0e-05
    adaptive_sampling:
      enabled: false
      adaptive_ratio: 0.3
      phi: quadratic
      phi_epsilon: 1.0
      phi_power: 2.0
    grad_clip_norm: null
    expert_grad_clip_norm: null
    time_marching:
      enabled: false
      num_windows: 5
      freeze_previous_windows: true
      m_distribution: quadratic
  burgers1d:
    pretrained_base_checkpoint: null
    spatial_dim: 1
    output_dim: 1
    spatial_domain:
    - - -1.0
      - 1.0
    temporal_domain:
    - 0.0
    - 1.0
    nu: 0.01
    wavelet_threshold: 0.001
    new_norm_threshold: 0.015
    tree_smoothness_threshold: 0.5
    window_type: smoothstep
    window_smoothness_order: 2
    loss_weights:
      residual: 1.0
      ic: 1.0
      bc: 1.0
      continuity: 0.0
    causal_training:
      enabled: false
      num_chunks: 32
      tol_schedule:
      - 0.01
      - 0.1
      - 1.0
      min_weight_threshold: 0.99
    rwf:
      enabled: false
      mean: 1.0
      std: 0.1
    fourier_features:
      enabled: false
      dim: 128
      scale: 1.0
      periodic: false
    init:
      hidden: default
      output: default
      ls_use_bias: false
    lra:
      enabled: false
      update_every: 100
      alpha: 0.1
      scheme: grad_norm
      epsilon: 1.0e-05
    adaptive_sampling:
      enabled: false
      adaptive_ratio: 0.5
      phi: quadratic
      phi_epsilon: 1.0
      phi_power: 2.0
    grad_clip_norm: null
    expert_grad_clip_norm: null
    time_marching:
      enabled: false
      num_windows: 5
      freeze_previous_windows: true
      m_distribution: quadratic
  kdv:
    pretrained_base_checkpoint: null
    spatial_dim: 1
    output_dim: 1
    spatial_domain:
    - - -1.0
      - 1.0
    temporal_domain:
    - 0.0
    - 1.0
    mu: 0.022
    wavelet_threshold: 0.0025
    new_norm_threshold: 0.2
    tree_smoothness_threshold: 0.4
    window_type: smoothstep
    window_smoothness_order: 3
    loss_weights:
      residual: 1.0
      ic: 1.0
      bc: 1.0
      continuity: 0.0
    causal_training:
      enabled: false
      num_chunks: 16
      tol_schedule:
      - 0.01
      min_weight_threshold: 0.99
    rwf:
      enabled: false
      mean: 1.0
      std: 0.1
    fourier_features:
      enabled: false
      dim: 10
      scale: 2.0
      periodic: false
    init:
      hidden: default
      output: default
      ls_use_bias: false
    lra:
      enabled: false
      update_every: 1000
      alpha: 0.1
      scheme: grad_norm
      epsilon: 1.0e-05
    adaptive_sampling:
      enabled: false
      adaptive_ratio: 0.3
      phi: quadratic
      phi_epsilon: 1.0
      phi_power: 2.0
    grad_clip_norm: null
    expert_grad_clip_norm: null
    time_marching:
      enabled: false
      num_windows: 4
      freeze_previous_windows: true
      m_distribution: quadratic
  ks:
    pretrained_base_checkpoint: null
    spatial_dim: 1
    output_dim: 1
    spatial_domain:
    - - 0.0
      - 6.283185307179586
    temporal_domain:
    - 0.0
    - 1.0
    alpha: 6.25
    beta: 0.390625
    gamma: 0.00152587890625
    wavelet_threshold: 0.04
    new_norm_threshold: 10.0
    tree_smoothness_threshold: 0.3
    window_type: smoothstep
    window_smoothness_order: 4
    loss_weights:
      residual: 1.0
      ic: 1.0
      bc: 1.0
      continuity: 0.0
    causal_training:
      enabled: false
      num_chunks: 32
      tol_schedule:
      - 0.01
      - 0.1
      - 1
      min_weight_threshold: 0.99
    rwf:
      enabled: false
      mean: 1.0
      std: 0.1
    fourier_features:
      enabled: false
      dim: 10
      scale: 1.0
      periodic: false
    init:
      hidden: default
      output: default
      ls_use_bias: false
    lra:
      enabled: false
      update_every: 100
      alpha: 0.1
      scheme: grad_norm
      epsilon: 1.0e-05
    adaptive_sampling:
      enabled: false
      adaptive_ratio: 0.5
      phi: quadratic
      phi_epsilon: 1.0
      phi_power: 2.0
    grad_clip_norm: null
    expert_grad_clip_norm: null
    time_marching:
      enabled: false
      num_windows: 10
      freeze_previous_windows: true
      m_distribution: quadratic
  sampling:
    n_residual_train: 10000
    sample_volume_ratio: 35
    n_initial_train: 256
    n_boundary_train: 256
    resample_every_epochs: 500
    plot_samples_every: 1000
  adaptive_pinn:
    enabled: true
    max_experts: 150
    variable_for_node_accept: norm
    variable_for_expert_size: norm
    AToE_threshold_capacity: null
    expert_type: mlp
    blending_mode: soft
    sigma_fraction: 0.2
    per_leaf_normalization: true
    tree_max_depth: 15
    tree_min_samples_leaf: 50
    enable_timing: false
    enable_gradient_diagnostics: false
    M_experts_num: 8
    epsilon_node_acceptance: 0.00
    split_icbc:
      enabled: true
      interface_decrease_weight: 0.0
    initial_train:
      epochs: 45000
      optimizer_1: adam
      optimizer_2: ssbroyden
      optimizer_switch_epoch: 5000
      lr: 0.001
      lr_schedule: none
      lr_decay_rate: 0.98
      lr_decay_steps: 1000
      lr_warmup_steps: 0
    # Short polish fine-tune for the interface-anneal / collar-data
    # ablation: 5k pure SSBroyden (no Adam stage; optimizer_2 null means
    # no switch).
    fine_tune:
      epochs: 5000
      optimizer_1: ssbroyden
      optimizer_2: null
      optimizer_switch_epoch: 5000
      lr: 0.0001
      lr_schedule: none
      lr_decay_rate: 0.98
      lr_decay_steps: 1000
      lr_warmup_steps: 0
      l2sp_lambda: 0.0
      collar_data_ratio: 0.0
# Interface-anneal / collar-data ablation on allen_cahn (pretrained root;
# always on: per-leaf normalization, collar training boxes, u0-guided
# u/u_x interfaces on every face, exact IC/BC on the blended composition
# at full weight). Phase-3-best is saved per run (best_model_phase3.pt +
# segment_reconcile_events), so the short fine-tune's contribution is
# directly readable per run.
#   A - baseline: no interface anneal, no collar sampling
#   B - interface anneal only (all u0 guides decay to 0.5 by phase-3 end)
#   C - collar-focused fine-tune sampling only (collar_data_ratio=0.5)
#   D - interface anneal + collar sampling
# Note: A/C share an identical phase 3, as do B/D (collar only affects
# fine-tune) - the C-A and D-B deltas isolate the collar effect.
experiments:
- name: A_baseline
  problem: allen_cahn
  model: AToELeaves
  base_architecture:
  - 2
  - 60
  - 60
  - 60
  - 60
  - 1
  experts_architecture:
  - 2
  - 20
  - 20
  - 20
  - 1
  adaptive_pinn:
    split_icbc:
      interface_decrease_weight: 0.0
    fine_tune:
      collar_data_ratio: 0.0
- name: B_interface_anneal
