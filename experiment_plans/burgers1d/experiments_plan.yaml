experiment_name: "burgers_root_creation"

base_config:
  problem: burgers1d
  model: AToELeaves                          # overridden per experiment
  activation: tanh
  precision: float64

  epochs: 40000
  batch_size: 99999
  patience_epochs: 5000             
  min_epochs: 1
  patience_rel_delta: 0.01            # min relative train-loss improvement to reset patience

  optimizer_1: adam
  optimizer_2: ssbroyden
  optimizer_switch_epoch: 1000
  lr: 0.001
  soap_betas: [0.95, 0.95]
  soap_precondition_frequency: 10
  soap_weight_decay: 0.0
  lr_schedule: none
  lr_decay_rate: 0.98
  lr_decay_steps: 1000
  lr_warmup_steps: 0
  lr_warmup_start_factor: 0.01

  adam_betas: [0.9, 0.999]
  adam_eps: 1.0e-8
  lbfgs_lr: 1.0
  lbfgs_max_iter: 1
  lbfgs_history_size: 100
  lbfgs_line_search: 'strong_wolfe'
  lbfgs_tolerance_grad: 0.0
  lbfgs_tolerance_change: 0.0
  ssbroyden_lr: 1.0
  ssbroyden_tolerance_grad: 1.0e-10

  cuda: true
  eval_only: false
  resume_from: null
  bins: 5
  n_bin_visualize_ncc: 100
  n_freq_grid: 128
  eval_every: 1000                    
  print_every: 1000
  save_every: 999999
  inner_metrics_eval_every: 9999999
  seed: 42

  # ══════════════════════════════════════════════════════════════════════════
  # ALLEN_CAHN — clean Kiyani config (no extra features)
  # ══════════════════════════════════════════════════════════════════════════
  allen_cahn:
    pretrained_base_checkpoint: "roots_checkpoints/allen_cahn_root.pt"  # path to a base checkpoint to skip Phase-1 training; null = train Phase 1
    spatial_dim: 1
    output_dim: 1
    spatial_domain: [[-1.0, 1.0]]
    temporal_domain: [0.0, 1.0]
    D: 0.0001
    wavelet_threshold: 0.002
    new_norm_threshold: 0.04
    tree_smoothness_threshold: 0.5
    loss_weights:
      residual: 1.0
      ic: 1.0
      bc: 1.0
      continuity: 0.0    # weight for neighbor-continuity loss in split_icbc
    causal_training:
      enabled: false
      num_chunks: 32
      tol_schedule: [0.01, 0.1, 1.0]
      min_weight_threshold: 0.99
    rwf:
      enabled: false
      mean: 1.0
      std: 0.1
    fourier_features:
      enabled: false
      dim: 10
      scale: 3.0
      periodic: false
    init:
      hidden: default
      output: default
      ls_use_bias: false
      spectral_norm: false
      spectral_norm_init_std: 1.0e-6
    lra:
      enabled: false
      update_every: 100
      alpha: 0.1
      scheme: grad_norm
      epsilon: 1.0e-5
    adaptive_sampling:
      enabled: false                   # CLEAN: off in 00; evaluated in 01_training
      adaptive_ratio: 0.3
      per_leaf_sampling: false
      phi: quadratic
      phi_epsilon: 1.0
      phi_power: 2.0
    grad_clip_norm: null
    expert_grad_clip_norm: null
    time_marching:
      enabled: false
      num_windows: 5
      freeze_previous_windows: true
      m_distribution: quadratic

  # ── Other problems (required by schema; not used) ──────────────────────────
  schrodinger:
    spatial_dim: 1
    output_dim: 2
    spatial_domain: [[-5.0, 5.0]]
    temporal_domain: [0.0, 1.5707963267948966]
    wavelet_threshold: 0.1
    new_norm_threshold: 2.0
    tree_smoothness_threshold: 0.7
    loss_weights: {residual: 1.0, ic: 1.0, bc: 1.0}
    rwf:
      enabled: false
      mean: 1.0
      std: 0.1
    fourier_features: {enabled: false, dim: 128, scale: 1.0, periodic: false}
    init: {hidden: parent_weights, output: default, ls_use_bias: false, spectral_norm: false, spectral_norm_init_std: 1.0e-6}
    lra: {enabled: false, update_every: 100, alpha: 0.1, scheme: grad_norm, epsilon: 1.0e-5}
    adaptive_sampling: {enabled: false, adaptive_ratio: 0.3, per_leaf_sampling: false, phi: quadratic, phi_epsilon: 1.0, phi_power: 2.0}
    grad_clip_norm: null
    expert_grad_clip_norm: null
    time_marching: {enabled: false, num_windows: 5, freeze_previous_windows: true, m_distribution: quadratic}

  burgers1d:
    pretrained_base_checkpoint: "roots_checkpoints/burgers_root.pt"
    spatial_dim: 1
    output_dim: 1
    spatial_domain: [[-1.0, 1.0]]
    temporal_domain: [0.0, 1.0]
    nu: 0.01
    wavelet_threshold: 0.001
    new_norm_threshold: 0.015
    tree_smoothness_threshold: 0.5
    loss_weights: {residual: 1.0, ic: 1.0, bc: 1.0}
    rwf:
      enabled: false
      mean: 1.0
      std: 0.1
    fourier_features: {enabled: false, dim: 128, scale: 1.0, periodic: false}
    init: {hidden: default, output: default, ls_use_bias: false, spectral_norm: false}
    lra: {enabled: false, update_every: 100, alpha: 0.1, scheme: grad_norm, epsilon: 1.0e-5}
    adaptive_sampling: {enabled: true, adaptive_ratio: 0.5, per_leaf_sampling: false, phi: quadratic, phi_epsilon: 1.0, phi_power: 2.0}
    grad_clip_norm: null
    expert_grad_clip_norm: null
    time_marching: {enabled: false, num_windows: 5, freeze_previous_windows: true, m_distribution: quadratic}

  kdv:
    spatial_dim: 1
    output_dim: 1
    spatial_domain: [[-1.0, 1.0]]
    temporal_domain: [0.0, 1.0]
    mu: 0.022
    wavelet_threshold: 0.0025
    new_norm_threshold: 0.2
    tree_smoothness_threshold: 0.4
    loss_weights: {residual: 1.0, ic: 1.0, bc: 1.0}
    causal_training: {enabled: false, num_chunks: 16, tol_schedule: [0.01], min_weight_threshold: 0.99, per_leaf_causal: false}
    rwf:
      enabled: false
      mean: 1.0
      std: 0.1
    fourier_features: {enabled: false, dim: 10, scale: 2.0, periodic: false}
    init: {hidden: parent_weights, output: default, ls_use_bias: false, spectral_norm: false, spectral_norm_init_std: 1.0e-6}
    lra: {enabled: false, update_every: 1000, alpha: 0.1, scheme: grad_norm, epsilon: 1.0e-5}
    adaptive_sampling: {enabled: false, adaptive_ratio: 0.3, per_leaf_sampling: false, phi: quadratic, phi_epsilon: 1.0, phi_power: 2.0}
    grad_clip_norm: null
    expert_grad_clip_norm: null
    time_marching: {enabled: false, num_windows: 5, freeze_previous_windows: true, m_distribution: quadratic}

  ks:
    spatial_dim: 1
    output_dim: 1
    spatial_domain: [[0.0, 6.283185307179586]]
    temporal_domain: [0.0, 1.0]
    alpha: 6.25
    beta: 0.390625
    gamma: 0.00152587890625
    wavelet_threshold: 0.04
    new_norm_threshold: 10.0
    tree_smoothness_threshold: 0.3
    loss_weights: {residual: 1.0, ic: 1.0, bc: 1.0}
    causal_training: {enabled: false, num_chunks: 32, tol_schedule: [0.01, 0.1, 1], min_weight_threshold: 0.99, per_leaf_causal: false}
    rwf:
      enabled: false
      mean: 1.0
      std: 0.1
    fourier_features: {enabled: true, dim: 10, scale: 1.0, periodic: false}
    init: {hidden: parent_weights, output: default, ls_use_bias: false, spectral_norm: false, spectral_norm_init_std: 1.0e-6}
    lra: {enabled: false, update_every: 100, alpha: 0.1, scheme: grad_norm, epsilon: 1.0e-5}
    adaptive_sampling: {enabled: true, adaptive_ratio: 0.5, per_leaf_sampling: false, phi: quadratic, phi_epsilon: 1.0, phi_power: 2.0}
    grad_clip_norm: null
    expert_grad_clip_norm: null
    time_marching: {enabled: true, num_windows: 20, freeze_previous_windows: true, m_distribution: equal}

  # ── Dataset sampling ───────────────────────────────────────────────────────
  sampling:
    n_residual_train: 10000
    sample_volume_ratio: 35
    n_initial_train: 256                 # explicit count (was initial_train_ratio)
    n_boundary_train: 256                # explicit count (was boundary_train_ratio)
    eval_train_ratio: 0.25
    ncc_train_ratio: 0.25
    resample_every_epochs: 100
    plot_samples_every: 1000
    min_points_per_leaf: 50

  # ── Adaptive PINN ──────────────────────────────────────────────────────────
  adaptive_pinn:
    enabled: true
    max_experts: 150
    spawn_every_epochs: 40000          # matches initial_train.epochs (Phase 1)
    variable_for_node_accept: norm
    variable_for_expert_size: norm
    AToE_threshold_capacity: null
    ANT_threshold_architecture: null
    ANT_default_hidden_layers: 30      # for M=10
    expert_type: mlp                   # Kiyani-exact (resnet evaluated in 01_training)
    blending_mode: soft
    sigma_fraction: 0.2
    base_weight: 1.0
    base_everywhere: true
    tree_max_depth: 15
    tree_min_samples_leaf: 50
    enable_timing: false
    inner_metrics_calculation: false
    enable_gradient_diagnostics: false
    expert_activation_threshold: 0
    relevant_samples_to_activate_expert: 0
    spawning_method: M_term_tree_by_norm
    M_experts_num: 10                  
    spawn_require_plateau: false
    spawn_plateau_epochs: 50
    spawn_plateau_delta: 0.05
    spawn_retries_before_stop: false
    spawn_retry_after: 10
    reinitialize_base_after_spawn: false
    split_icbc: { enabled: true }
    additive: false

    initial_train:
      epochs: 40000
      optimizer_1: adam
      optimizer_2: ssbroyden
      optimizer_switch_epoch: 1000
      lr: 0.001
      lr_schedule: none
      lr_decay_rate: 0.98
      lr_decay_steps: 1000
      lr_warmup_steps: 0

    # ── Staged per-level (AToE / ANT) ──
    new_expert_lr_decay: 1.0
    min_epochs_per_level: 1
    max_epochs_per_level: 40000        # ceiling; patience terminates earlier

    # ── Final joint fine-tune (AToE / ANT) ──
    # Cautious learning: low-LR Adam warmup → SSBroyden polish + L2-SP anchoring
    fine_tune:
      epochs: 40000
      optimizer_1: adam                     # gentle warmup (5k epochs)
      optimizer_2: ssbroyden                # curvature-aware polish (30k epochs)
      optimizer_switch_epoch: 1000
      lr: 0.0001                            
      lr_schedule: none
      lr_decay_rate: 0.98
      lr_decay_steps: 1000
      lr_warmup_steps: 500                  # ramp LR from near-zero
      l2sp_lambda: 0.00                     # anchor weights to pre-fine-tune values


experiments:
  - name: M_10
    problem: burgers1d
    model: AToELeaves
    base_architecture: [2, 60, 60, 60, 60, 1]
    experts_architecture: [2, 20, 20, 20, 20, 1]

